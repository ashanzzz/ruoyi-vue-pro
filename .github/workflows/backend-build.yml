name: WebDAV安全部署

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  WEBDAV_URL: https://alist.335356119.xyz/dav/
  TARGET_PATH: /群晖/home/download

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------- 基础构建 ---------------
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 构建项目
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
      run: mvn clean package -Dmaven.test.skip=true

    # --------------- 安全分卷 ---------------
    - name: 分卷处理
      run: |
        mkdir -p upload
        find . -name "*.jar" -exec sh -c '
          file="{}"
          split -d -b 50M "$file" "upload/$(basename "$file").part."
          md5sum "$file" > "upload/$(basename "$file").md5"
        ' \;

    # --------------- WebDAV认证 ---------------
    - name: 配置WebDAV
      env:
        DAV_USER: ${{ secrets.WEBDAV_USER }}  # 在Secrets中设置 ashan
        DAV_PASS: ${{ secrets.WEBDAV_PASS }}  # 在Secrets中设置 Woo@@@204317
      run: |
        echo "machine alist.335356119.xyz
        login $DAV_USER
        password $DAV_PASS" > ~/.netrc
        chmod 600 ~/.netrc

    # --------------- 安全传输 ---------------
    - name: 上传文件
      run: |
        # 使用curl递归上传
        curl -v -n -X MKCOL "${WEBDAV_URL}${TARGET_PATH}" || true
        find upload/ -type f -exec curl -n -T {} "${WEBDAV_URL}${TARGET_PATH}/{}" \;

        # 生成访问清单
        echo "上传时间: $(date)" > upload.log
        find upload/ -type f >> upload.log
        curl -n -T upload.log "${WEBDAV_URL}${TARGET_PATH}/"

    # --------------- 后置清理 ---------------
    - name: 安全清理
      run: |
        shred -zu ~/.netrc
        rm -rf upload/
