name: 后端构建与部署

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 代码检出 ---------------------
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    # --------------------- JDK环境 ---------------------
    - name: 设置JDK 17
      uses: actions/setup-java@v4  # 同步升级到v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # --------------------- 构建阶段 ---------------------
    - name: 缓存依赖
      uses: actions/cache@v4  # 升级到最新版
      with:
        path: |
          ~/.m2/repository
          **/target/
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

    - name: Maven编译
      run: mvn clean package -Dmaven.test.skip=true -T 1C

    # --------------------- 产物处理 (关键修复点) ---------------------
    - name: 上传构建产物
      uses: actions/upload-artifact@v4  # 升级到v4版本
      with:
        name: jar-packages
        path: |
          **/target/*.jar
          !**/*-tests.jar  # 明确排除测试jar
        retention-days: 3
        if-no-files-found: error
        compression-level: 9  # 新增v4优化参数

    # --------------------- 部署阶段 ---------------------
    - name: 生成版本文件
      run: |
        echo "构建时间: $(date '+%Y-%m-%d %H:%M:%S')" > build-info.txt
        echo "提交ID: ${{ github.sha }}" >> build-info.txt
        find . -name "*.jar" -printf "%f\n" >> build-info.txt

    - name: 推送到release分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 创建孤儿分支（全新历史）
        git checkout --orphan temp-release
        git add -f **/target/*.jar build-info.txt
        git commit -m "chore: 发布v$(date '+%Y%m%d%H%M')"
        
        # 分支替换策略
        git branch -D release || true
        git branch -m release
        git push -f origin release

    # --------------------- 结果通知 ---------------------
    - name: 输出构建结果
      run: |
        echo "=== 部署成果 ==="
        echo "Jar文件列表:"
        cat build-info.txt | grep '.jar'
        echo "访问地址:"
        echo "https://github.com/ashanzzz/ruoyi-vue-pro/releases/latest"
