name: Backend Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 修复1：使用最新版 actions ---------------------
    - name: Checkout code
      uses: actions/checkout@v4  # 从 v2 升级到 v4

    # --------------------- 修复2：明确指定 JDK 版本 ---------------------
    - name: Set up JDK 17
      uses: actions/setup-java@v3  # 使用稳定版本
      with:
        java-version: '17'        # 根据项目实际需求指定
        distribution: 'temurin'  # Eclipse Temurin 发行版
        cache: 'maven'            # 启用 Maven 缓存

    # --------------------- 修复3：优化缓存配置 ---------------------
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository
          **/target/*.jar
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    # --------------------- 修复4：添加构建日志输出 ---------------------
    - name: Build with Maven
      run: |
        echo "### 构建开始 ###"
        mvn clean package -Dmaven.test.skip=true -B -V
        echo "### 构建产物列表 ###"
        find . -name "*.jar" -exec ls -lh {} \;

    # --------------------- 修复5：优化产物上传 ---------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-jars
        path: |
          **/target/*.jar
          !**/surefire-reports/
        if-no-files-found: error  # 找不到文件时报错
