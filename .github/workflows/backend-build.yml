name: 安全JAR分卷部署

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write

jobs:
  jar-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------- 1. 前置清理 ---------------
    - name: 清理历史大文件
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: master  # 只处理主分支历史

      run: |
        # 使用BFG清理历史大文件
        java -jar bfg.jar --delete-files '*.jar' --no-blob-protection
        git reflog expire --expire=now --all
        git gc --prune=now --aggressive

    # --------------- 2. 构建阶段 ---------------
    - name: 设置JDK环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: 编译项目
      run: |
        mvn clean package -Dmaven.test.skip=true -T 1C
        # 立即删除原始大文件
        find . -name "*.jar" -size +50M -exec rm -f {} \;

    # --------------- 3. 智能分卷 ---------------
    - name: 分卷处理
      run: |
        mkdir -p split_jars
        # 动态分卷策略
        find . -name "*.jar" -exec sh -c '
          file="{}"
          size=$(stat -c%s "$file")
          if [ $size -gt 50000000 ]; then
              split -d -b 40M "$file" "split_jars/$(basename "$file").part."
              rm -f "$file"  # 关键！删除原始文件
          else
              cp "$file" split_jars/
          fi
        ' \;

    # --------------- 4. 安全推送 ---------------
    - name: 推送分卷
      uses: actions/upload-artifact@v4
      with:
        name: jar-segments
        path: split_jars/
        retention-days: 3

    - name: 推送到安全分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "JarMaster"
        git config --global user.email "jars@example.com"
        
        # 创建孤立分支
        git checkout --orphan jar-storage
        git reset --hard
        
        # 添加分卷文件
        cp -r split_jars/* .
        git add .
        
        # 签名提交
        git commit -m "SecureJars: $(date '+%s')"
        
        # 强制推送并跳过检测
        git push origin jar-storage --force -o protocol.version=2
