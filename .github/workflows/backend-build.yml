name: JAR直传部署系统

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  jar-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------- 基础配置 ---------------
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: 设置JDK环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # --------------- 构建阶段 ---------------
    - name: 编译项目
      run: mvn clean package -Dmaven.test.skip=true -T 1C

    # --------------- JAR分卷处理 ---------------
    - name: 分卷大文件
      run: |
        mkdir -p jar_parts
        # 查找并分割所有Jar
        find . -name "*.jar" -exec sh -c '
          file="{}"
          filename=$(basename "$file")
          split -d -b 80M "$file" "jar_parts/${filename}.part."
          md5sum "$file" > "jar_parts/${filename}.md5"
        ' \;

    # --------------- 产物推送 ---------------
    - name: 上传JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: raw-jar-packages
        path: |
          jar_parts/*.part.*
          jar_parts/*.md5
        retention-days: 7
        if-no-files-found: error

    # --------------- 分支推送 ---------------
    - name: 推送至JAR分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "JarBot"
        git config --global user.email "jar@example.com"
        
        # 创建临时分支
        git checkout --orphan temp-jar
        git reset --hard
        
        # 组织文件结构
        mkdir -p jars
        cp -r jar_parts/* .
        git add .
        
        # 提交并推送
        git commit -m "Auto: 原始JAR文件 $(date '+%m%d%H%M')"
        git push origin temp-jar:raw-jars --force
