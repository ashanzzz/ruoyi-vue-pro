name: 后端构建与部署

on:
  push:
    branches: [ "master" ]  # 只在master分支推送时触发
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write  # 赋予工作流推送代码的权限

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 第一阶段：代码准备 ---------------------
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0       # 获取完整提交历史
        persist-credentials: true  # 保留Git凭证供后续步骤使用

    # --------------------- 第二阶段：Java环境配置 ---------------------
    - name: 设置JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'    # 项目使用JDK 17
        distribution: 'temurin'  # 推荐使用Eclipse Temurin发行版
        cache: 'maven'       # 启用Maven依赖缓存

    # --------------------- 第三阶段：依赖缓存加速 ---------------------
    - name: 缓存Maven依赖
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository   # Maven本地仓库路径
          **/target/         # 缓存编译结果（可选）
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }} # 根据pom文件变化更新缓存
        restore-keys: |
          ${{ runner.os }}-maven-

    # --------------------- 第四阶段：项目编译构建 ---------------------
    - name: Maven编译打包
      run: |
        # 使用并行编译加速构建，跳过测试
        mvn clean package -Dmaven.test.skip=true -T 1C -B -V
        
        echo "=============== 生成的Jar文件列表 ==============="
        find . -name "*.jar" -exec ls -lh {} \;  # 列出所有生成的Jar文件
        echo "================================================"

    # --------------------- 第五阶段：产物处理与部署 ---------------------
    - name: 上传构建产物
      uses: actions/upload-artifact@v3
      with:
        name: jar-packages
        path: |
          **/target/*.jar     # 包含所有子模块的Jar文件
          !**/surefire-reports/  # 排除测试报告
        retention-days: 7     # 产物保留7天
        if-no-files-found: error

    - name: 推送至release分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 配置Git用户信息
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # 创建或重置release分支
        git checkout --orphan release
        git reset --hard
        
        # 移动所有Jar文件到根目录（根据项目需求调整）
        find . -name "*.jar" -exec mv {} . \;
        
        # 清理原始代码（保留Jar文件）
        shopt -s extglob
        rm -rf !(*.jar)  # 删除非Jar文件
        
        # 提交并强制推送
        git add -A
        git commit -m "chore: 自动更新部署包 (构建ID: ${{ github.run_id }})"
        git push origin release --force

    # --------------------- 第六阶段：输出信息 ---------------------
    - name: 生成部署报告
      run: |
        echo "本次构建生成的Jar文件已存储到以下位置："
        echo "1. GitHub Actions 产物仓库："
        echo "   - 访问仓库 Actions 页面，在 Artifacts 区域下载 jar-packages.zip"
        echo ""
        echo "2. release 分支根目录："
        echo "   - 访问 https://github.com/ashanzzz/ruoyi-vue-pro/tree/release"
        echo ""
        echo "文件列表："
        find . -name "*.jar" -printf "   - %p\n"
