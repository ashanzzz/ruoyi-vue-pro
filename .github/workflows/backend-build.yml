name: 分卷部署系统

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 基础配置 ---------------------
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # --------------------- 构建阶段 ---------------------
    - name: 编译项目
      run: mvn clean package -Dmaven.test.skip=true -T 1C

    # --------------------- 分卷压缩（核心步骤）---------------------
    - name: 安装7-Zip
      run: sudo apt-get install -y p7zip-full

    - name: 压缩为分卷包
      run: |
        # 创建临时目录
        mkdir -p split_files
        
        # 查找所有Jar文件进行分卷压缩
        find . -name "*.jar" -exec 7z a -v80m -t7z -mmt=on split_files/output.7z {} +
        
        # 生成校验文件
        md5sum split_files/*.7z* > split_files/checksum.md5

    # --------------------- 分卷部署 ---------------------
    - name: 推送分卷包到分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 创建专用分支
        git checkout --orphan split-release
        git reset --hard
        
        # 添加分卷文件
        cp -r split_files/* .
        git add *.7z* checksum.md5
        
        # 提交并推送
        git commit -m "chore: 分卷包 v$(date '+%Y%m%d%H%M')"
        git push origin split-release --force

    # --------------------- 产物备份 ---------------------
    - name: 上传分卷包备份
      uses: actions/upload-artifact@v4
      with:
        name: split-packages
        path: |
          split_files/*.7z*
          split_files/checksum.md5
        retention-days: 7
