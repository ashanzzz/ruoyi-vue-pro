name: 后端构建与部署

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

# --------------------- 修正后的权限配置 ---------------------
permissions:
  contents: write  # 正确权限作用域
  packages: write  # 如需发布到GitHub Packages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------------- Git LFS 前置配置 ---------------------
    - name: 安装Git LFS
      run: |
        sudo apt-get update
        sudo apt-get install -y git-lfs
        git lfs install --skip-repo

    - name: 检出代码（含LFS）
      uses: actions/checkout@v4
      with:
        lfs: true  # 此处才是正确启用LFS的位置
        fetch-depth: 0
        persist-credentials: true

    # --------------------- 构建阶段 ---------------------
    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: 优化构建配置
      run: |
        # 使用Maven shade插件排除测试类
        mvn clean package -Dmaven.test.skip=true -T 1C -B \
          -Dmaven.shade.excludeTests=true \
          -Dmaven.javadoc.skip=true

    # --------------------- 产物分流处理 ---------------------
    - name: 拆分部署文件
      run: |
        # 将主应用Jar单独分类
        mkdir -p lfs-files
        find . -name "yudao-server*.jar" -exec mv {} lfs-files \;
        find . -name "*.jar" -exec mv {} . \;

    # --------------------- LFS推送 ---------------------
    - name: 推送至release分支
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 创建专用分支
        git checkout --orphan release
        git reset --hard
        
        # 处理LFS文件
        git lfs install
        git lfs track "lfs-files/**"
        mv lfs-files/* . && rm -rf lfs-files
        
        # 精简提交内容
        git add -A
        git commit -m "chore: 发布v$(date '+%Y%m%d%H%M') (LFS)"
        
        # 强制推送（需仓库设置允许LFS强制推送）
        git push origin release --force --follow-tags
