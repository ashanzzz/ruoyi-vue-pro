name: Backend Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # 允许手动触发

# --------------------- 关键修复：赋予写入权限 ---------------------
permissions:
  contents: write  # 允许推送代码到分支

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 代码检出（含凭证持久化）---------------------
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true  # 保留Git凭证供后续使用

    # --------------------- JDK 环境 ---------------------
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # --------------------- 智能缓存依赖 ---------------------
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2/repository
          **/target/
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    # --------------------- 构建验证 ---------------------
    - name: Build with Maven
      run: |
        # 构建前清理
        mvn clean -B
        # 并行构建加速
        mvn package -Dmaven.test.skip=true -T 1C -B -V
        # 产物验证
        echo "构建产物:"
        find . -name "*.jar" -exec ls -lh {} \;

    # --------------------- 分支推送（含冲突处理）---------------------
    - name: Push to release branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用自动生成的token
      run: |
        # 配置Git身份
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 创建或重置release分支
        git checkout --orphan release
        git rm -rf .  # 清理历史文件
        
        # 仅保留Jar包和必要文件
        find . -name "*.jar" -exec git add -f {} \;
        git add pom.xml README.md  # 按需添加其他文件
        
        # 提交并强制推送
        git commit -m "chore: Auto-update jars (Build ${{ github.run_id }})"
        git push origin release --force --verbose

    # --------------------- 产物存档 ---------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-jars
        path: |
          **/target/*.jar
          !**/surefire-reports/
        retention-days: 3
