name: 🗜️ JAR分卷部署系统（修复版）

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BRANCH_NAME: "split-release"
  SPLIT_SIZE: "90M"
  TAR_NAME: "jars.tar.gz"
  WORK_DIR: "split_files"  # 新增工作目录

jobs:
  split-and-push:
    runs-on: ubuntu-latest

    steps:
    # --------------- 1. 代码检出 ---------------
    - name: 🔍 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # --------------- 2. 设置环境 ---------------
    - name: 🛠️ 设置Java环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # --------------- 3. 编译项目 ---------------
    - name: 📦 Maven编译
      run: mvn clean package -Dmaven.test.skip=true

    # --------------- 4. 分卷压缩（路径修复）---------------
    - name: 🗜️ 压缩分卷
      run: |
        # 创建独立工作目录
        mkdir -p $WORK_DIR
        
        # 压缩到指定目录
        tar -zcvf $WORK_DIR/$TAR_NAME **/target/*.jar
        
        # 在指定目录分割文件
        cd $WORK_DIR
        split -d -b $SPLIT_SIZE $TAR_NAME "$TAR_NAME.part."
        
        # 生成校验文件
        md5sum $TAR_NAME.part.* > checksum.md5

    # --------------- 5. 推送到分支（路径修复）---------------
    - name: 🚀 推送分卷
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 配置Git身份
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # 创建或重置分支
        git checkout --orphan $BRANCH_NAME
        git reset --hard
        
        # 移动文件到根目录
        mv $WORK_DIR/* .
        rmdir $WORK_DIR
        
        # 添加并提交文件
        git add .
        git commit -m "Release: JAR分卷包 $(date '+%Y%m%d%H%M')"
        git push origin $BRANCH_NAME --force
