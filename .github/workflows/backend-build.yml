name: 直传WebDAV部署

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  WEBDAV_URL: "https://alist.335356119.xyz/dav/群晖/home/download"
  SOURCE_DIR: "**/target/*.jar"  # 匹配所有Jar文件

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # --------------- 1. 代码检出 ---------------
    - name: 检出代码
      uses: actions/checkout@v4

    # --------------- 2. 构建项目 ---------------
    - name: 设置JDK环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: 编译打包
      run: mvn clean package -Dmaven.test.skip=true

    # --------------- 3. 文件传输 (带进度条) ---------------
    - name: 安装传输工具
      run: sudo apt-get install -y pv  # 进度查看工具

    - name: 传输文件到WebDAV
      env:
        DAV_USER: ${{ secrets.WEBDAV_USER }}
        DAV_PASS: ${{ secrets.WEBDAV_PASS }}
      run: |
        # 生成文件列表
        file_list=$(find . -path "$SOURCE_DIR")
        total_files=$(echo "$file_list" | wc -l)
        
        # 循环传输每个文件
        i=0
        for file in $file_list; do
          ((i++))
          echo "正在上传 ($i/$total_files): ${file##*/}"
          
          # 使用pv显示进度和速度
          pv -n -b -r -a "$file" | \
          curl -u "$DAV_USER:$DAV_PASS" \
               -T - \
               --progress-bar \
               "$WEBDAV_URL/${file##*/}" \
               | tee /dev/stderr
        done

    # --------------- 4. 结果验证 ---------------
    - name: 验证传输结果
      env:
        DAV_USER: ${{ secrets.WEBDAV_USER }}
        DAV_PASS: ${{ secrets.WEBDAV_PASS }}
      run: |
        # 获取本地文件列表
        local_files=$(find . -path "$SOURCE_DIR" -exec basename {} \; | sort)
        
        # 获取远程文件列表
        remote_files=$(curl -u "$DAV_USER:$DAV_PASS" -s -X PROPFIND "$WEBDAV_URL" | 
                       grep -oP '<d:displayname>\K.*?(?=</d:displayname>)' | 
                       sort)
        
        # 对比差异
        diff <(echo "$local_files") <(echo "$remote_files") || {
          echo "错误：远程文件与本地不一致"
          exit 1
        }
