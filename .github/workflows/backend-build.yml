name: 🗜️ JAR分卷部署系统

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BRANCH_NAME: "split-release"  # 分卷存储分支
  SPLIT_SIZE: "90M"            # 分卷大小
  TAR_NAME: "jars.tar.gz"       # 压缩包名称

jobs:
  split-and-push:
    runs-on: ubuntu-latest

    steps:
    # --------------- 1. 代码检出 ---------------
    - name: 🔍 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # --------------- 2. 设置环境 ---------------
    - name: 🛠️ 设置Java环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # --------------- 3. 编译项目 ---------------
    - name: 📦 Maven编译
      run: mvn clean package -Dmaven.test.skip=true

    # --------------- 4. 分卷压缩 ---------------
    - name: 🗜️ 压缩分卷
      run: |
        # 创建压缩包
        tar -zcvf $TAR_NAME **/target/*.jar
        
        # 分割为90MB分卷
        split -d -b $SPLIT_SIZE $TAR_NAME "$TAR_NAME.part."
        
        # 生成校验文件
        md5sum $TAR_NAME.part.* > checksum.md5

    # --------------- 5. 推送到分支 ---------------
    - name: 🚀 推送分卷
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 配置Git身份
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        # 创建或重置分支
        git checkout --orphan $BRANCH_NAME
        git reset --hard
        
        # 添加分卷文件
        mv $TAR_NAME.part.* checksum.md5 .
        git add .
        
        # 提交并强制推送
        git commit -m "Release: JAR分卷包 $(date '+%Y%m%d%H%M')"
        git push origin $BRANCH_NAME --force
