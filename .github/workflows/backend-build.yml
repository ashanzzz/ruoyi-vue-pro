name: 🚀 直传WebDAV部署系统

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  WEBDAV_URL: "https://alist.335356119.xyz/dav/群晖/home/download"
  SOURCE_DIR: "**/target/*.jar"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🔍 检出代码
      uses: actions/checkout@v4

    - name: 🛠️ 设置JDK环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: 📦 编译打包
      run: mvn clean package -Dmaven.test.skip=true

    - name: 🚚 文件传输
      env:
        DAV_USER: ${{ secrets.WEBDAV_USER }}
        DAV_PASS: ${{ secrets.WEBDAV_PASS }}
      run: |
        # 带中文注释的传输脚本
        echo "=== 开始文件传输 ==="
        
        # 生成文件列表
        file_list=$(find . -path "$SOURCE_DIR")
        total_files=$(echo "$file_list" | wc -l)
        
        # 循环传输
        counter=0
        for file in $file_list; do
          ((counter++))
          filename=$(basename "$file")
          echo "📤 正在上传 ($counter/$total_files): $filename"
          
          # 使用curl显示进度条
          curl --user "$DAV_USER:$DAV_PASS" \
               --upload-file "$file" \
               --progress-bar \
               "$WEBDAV_URL/$filename"
        done
        
        echo "✅ 所有文件传输完成"
