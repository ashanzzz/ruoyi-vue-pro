- name: 🚚 安全验证传输
  env:
    DAV_USER: ${{ secrets.WEBDAV_USER }}
    DAV_PASS: ${{ secrets.WEBDAV_PASS }}
  run: |
    # 安全显示凭据信息
    echo "=== 凭据验证 ==="
    echo "用户名: ${DAV_USER:0:2}****${DAV_USER: -2}"
    echo "密码: ${DAV_PASS:0:2}****${DAV_PASS: -2}"
    
    # 创建测试文件
    TEST_FILE="github_action_test_$(date +%s).txt"
    echo "This is a test file from GitHub Actions" > $TEST_FILE
    
    # 带诊断的测试上传
    if curl -v -u "$DAV_USER:$DAV_PASS" \
         -T ./$TEST_FILE \
         --fail \
         "$WEBDAV_URL/$TEST_FILE" 2> curl.log; then
    
      echo "✅ 凭据验证通过"
      curl -u "$DAV_USER:$DAV_PASS" -X DELETE "$WEBDAV_URL/$TEST_FILE"
      exit 0
    else
      echo "❌ 凭据验证失败"
      
      # 解析curl日志
      if grep -q "401 Unauthorized" curl.log; then
        echo "错误原因: 用户名或密码错误"
      elif grep -q "404 Not Found" curl.log; then
        echo "错误原因: 目标路径不存在"
      elif grep -q "timed out" curl.log; then
        echo "错误原因: 连接超时，请检查网络"
      else
        echo "未知错误，查看调试日志："
        cat curl.log | grep -i 'error\|fail'
      fi
      
      exit 1
    fi
