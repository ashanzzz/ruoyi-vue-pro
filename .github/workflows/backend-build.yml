name: Backend Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # --------------------- 代码检出 ---------------------
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整 git 历史（用于版本号生成）

    # --------------------- JDK 环境 ---------------------
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # --------------------- Maven 构建 ---------------------
    - name: Build with Maven
      run: |
        mvn clean package -Dmaven.test.skip=true -B -V

    # --------------------- 产物上传 ---------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-jars
        path: |
          **/target/*.jar
          !**/surefire-reports/
        retention-days: 7 # 产物保留7天

    # --------------------- 自动打版本标签 ---------------------
    - name: Create Release Version
      id: create_version
      uses: mathieudutour/github-tag-action@v6
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        tag_prefix: "v"

    # --------------------- 推送到Release分支 ---------------------
    - name: Push to release branch
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git checkout -B release
        git add **/target/*.jar
        git commit -m "chore: auto-commit built jars (v${{ steps.create_version.outputs.new_tag }})"
        git push origin release --force
