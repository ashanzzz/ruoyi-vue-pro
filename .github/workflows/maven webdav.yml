name: Build and Upload via WebDAV (Manual Trigger)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # 进入 yudao-server 模块目录构建
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven in yudao-server
        working-directory: yudao-server
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Rename jar file
        working-directory: yudao-server/target
        run: |
          if [ -f "yudao-server.jar" ]; then
            NEW_NAME="yudao-server-jdk${{ matrix.java }}.jar"
            echo "Renaming yudao-server.jar to ${NEW_NAME}"
            mv yudao-server.jar "${NEW_NAME}"
          else
            echo "Error: yudao-server.jar not found in $(pwd)"
            exit 1
          fi

      - name: Upload jar to WebDAV
        working-directory: yudao-server/target
        env:
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
        run: |
          NEW_NAME="yudao-server-jdk${{ matrix.java }}.jar"
          # 删除目标目录中同名的旧文件（若存在）
          echo "Deleting old file (if exists) on WebDAV..."
          curl -X DELETE --fail -u "$WEBDAV_USER:$WEBDAV_PASS" "https://alist.335356119.xyz/dav/群晖/home/download/jar/${NEW_NAME}" || echo "No previous file found or deletion failed"
          # 上传新文件，并显示上传进度
          echo "Uploading ${NEW_NAME} to WebDAV..."
          curl --progress-bar -T "${NEW_NAME}" -u "$WEBDAV_USER:$WEBDAV_PASS" "https://alist.335356119.xyz/dav/群晖/home/download/jar/${NEW_NAME}"
