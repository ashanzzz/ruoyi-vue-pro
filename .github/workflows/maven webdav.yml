name: Java CI with Maven webdav

on:
  push:
    branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8' ]
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK ${{ matrix.Java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Rename jar file
        run: |
          # 假设 jar 文件生成在 yudao-server/target 目录下
          if [ -f "yudao-server/target/yudao-server.jar" ]; then
            NEW_NAME="yudao-server-jdk${{ matrix.java }}.jar"
            echo "Renaming yudao-server/target/yudao-server.jar to ${NEW_NAME}"
            mv yudao-server/target/yudao-server.jar yudao-server/target/${NEW_NAME}
          else
            echo "Error: yudao-server.jar not found in yudao-server/target"
            exit 1
          fi

      - name: Upload jar to WebDAV
        env:
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
        run: |
          NEW_NAME="yudao-server-jdk${{ matrix.java }}.jar"
          TARGET_URL="https://alist.335356119.xyz/dav/群晖/home/download/jar/${NEW_NAME}"
          # 删除目标位置中同名的旧文件（如果存在）
          echo "Deleting old file (if exists) from WebDAV: ${TARGET_URL}"
          curl -X DELETE --fail -u "$WEBDAV_USER:$WEBDAV_PASS" "${TARGET_URL}" || echo "No old file found or deletion failed"
          # 上传新文件，并显示进度条（--progress-bar 会显示上传进度和速度等信息）
          echo "Uploading new file to WebDAV: ${TARGET_URL}"
          curl --progress-bar -T "yudao-server/target/${NEW_NAME}" -u "$WEBDAV_USER:$WEBDAV_PASS" "${TARGET_URL}"
