name: Build and Upload Artifact (Manual Trigger)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # 进入 yudao-server 模块目录构建
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven in yudao-server
        working-directory: yudao-server
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Rename jar file
        working-directory: yudao-server/target
        run: |
          if [ -f "yudao-server.jar" ]; then
            NEW_NAME="yudao-server-jdk${{ matrix.java }}.jar"
            echo "Renaming yudao-server.jar to ${NEW_NAME}"
            mv yudao-server.jar "${NEW_NAME}"
          else
            echo "Error: yudao-server.jar not found in $(pwd)"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: yudao-server-jdk${{ matrix.java }}
          path: yudao-server/target/yudao-server-jdk${{ matrix.java }}.jar
