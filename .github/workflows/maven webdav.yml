name: Java CI with Maven and Find Jar

on:
  push:
    branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: List current directory
        run: ls -al

      - name: Find jar files in workspace
        run: |
          echo "Searching jar files in workspace ($GITHUB_WORKSPACE):"
          find "$GITHUB_WORKSPACE" -type f -name "*.jar"
