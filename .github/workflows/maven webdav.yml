name: Java CI with Maven and WebDAV Upload

on:
  push:
    branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]

    steps:
      - uses: actions/checkout@v2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Upload jar to Synology via WebDAV
        env:
          WEBDAV_USER: ${{ secrets.WEBDAV_USER }}
          WEBDAV_PASS: ${{ secrets.WEBDAV_PASS }}
        run: |
          # 查找构建生成的 jar 文件（假设生成在 target 目录下只有一个 jar 文件）
          JAR_FILE=$(ls target/*.jar | head -n 1)
          # 定义新文件名，包含当前构建使用的 Java 版本
          NEW_NAME="myproject-java${{ matrix.java }}.jar"
          mv "$JAR_FILE" "$NEW_NAME"
          echo "Uploading file: $NEW_NAME"
          # 显示文件大小（单位：字节）
          FILE_SIZE=$(stat -c%s "$NEW_NAME")
          echo "File size: $FILE_SIZE bytes"
          # 删除目标位置同名的旧文件（如果存在）
          echo "Deleting old file if exists..."
          curl -X DELETE --fail -u "$WEBDAV_USER:$WEBDAV_PASS" "https://alist.335356119.xyz/dav/群晖/home/download/jar/$NEW_NAME" || echo "No previous file found or deletion failed"
          # 上传新文件，并显示上传进度条
          curl --progress-bar -T "$NEW_NAME" -u "$WEBDAV_USER:$WEBDAV_PASS" "https://alist.335356119.xyz/dav/群晖/home/download/jar/$NEW_NAME"
